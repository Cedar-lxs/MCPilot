# MCPilot — Docker Compose 一键启动
#   docker compose up -d

services:
  api:
    build: .
    container_name: mcpilot-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./chroma_data:/app/chroma_data
    restart: unless-stopped

  ui:
    build: .
    container_name: mcpilot-ui
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped
